# ============================================================
# CONSERVATIVE — Paper trading, low risk, tight controls
# ============================================================

[mode]
run_mode                  = "paper"
dry_run                   = true
fail_closed_without_llm   = true
single_position_per_symbol = true

[exchange]
name            = "binance"
market          = "futures"
rest_base_url   = "https://fapi.binance.com"
ws_base_url     = "wss://fstream.binance.com/stream"
api_key         = ""          # set via env BINANCE_API_KEY
api_secret      = ""          # set via env BINANCE_API_SECRET
recv_window_ms  = 5000
open_type       = "cross"
leverage        = 3
position_mode   = "dual-side"

[pairs]
symbols    = ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
timeframes = ["5m", "15m"]

[strategy]
mode                = "adaptive"
active              = ["mean_reversion", "ema_ribbon", "momentum", "vwap_scalp", "squeeze"]
min_ta_confidence   = 65
paper_scout_enabled = true

[advanced_alpha]
enabled                  = false
min_abs_score            = 0.20
reduce_confidence_delta  = 5
feed_max_age_secs        = 180
kalman_process_noise     = 0.01
kalman_measurement_noise = 1.0

[llm]
provider        = "openai"
model           = "mimo-v2.5-pro"
api_key         = ""          # set via env LLM_API_KEY
api_base        = "https://token-plan-sgp.xiaomimimo.com/v1/chat/completions"
http_referer    = "https://github.com/whaledecoder/crypto-scalper"
http_app_title  = "ARIA Crypto Scalper"
timeout_secs    = 30
min_confidence  = 65
fallback_ta_threshold = 65
max_tokens      = 1024

[manager]
enabled               = false
provider              = "openai"
api_base              = "https://token-plan-sgp.xiaomimimo.com/v1/chat/completions"
model                 = "mimo-v2.5-pro"
timeout_secs          = 30
max_tokens            = 600
fast_approve_min_conf = 80
http_referer          = "https://github.com/whaledecoder/crypto-scalper"
http_app_title        = "ARIA TraderManager"
fail_open_on_error    = true

[risk]
equity_usd                = 5000.0
risk_per_trade_pct        = 0.5
max_open_positions        = 3
max_daily_loss_pct        = 2.0
max_drawdown_pct          = 5.0
max_leverage              = 3
max_spread_pct            = 0.04
min_reward_risk           = 1.3
min_net_edge_bps          = 0.0
max_position_notional_pct = 25.0
assumed_daily_volume_usd  = 1_000_000_000.0
min_margin_usd            = 10.0
max_hold_secs             = 1800

[schedule]
dead_zone_start_hour_wib = 0
dead_zone_end_hour_wib   = 0

[feeds]
cryptopanic_api_key = ""   # env CRYPTOPANIC_API_KEY
lunarcrush_api_key  = ""   # env LUNARCRUSH_API_KEY
glassnode_api_key   = ""   # env GLASSNODE_API_KEY
whalealert_api_key  = ""   # env WHALE_ALERT_API_KEY
deribit_base_url    = "https://www.deribit.com"
rss_feeds = [
    "https://www.coindesk.com/arc/outboundfeeds/rss/",
    "https://decrypt.co/feed",
    "https://cointelegraph.com/rss",
]

[monitoring]
telegram_bot_token = ""    # env TELEGRAM_BOT_TOKEN
telegram_chat_id   = ""    # env TELEGRAM_CHAT_ID
log_level          = "info"
db_path            = "trades.db"
metrics_bind       = "0.0.0.0:7999"

[backtest]
data_dir              = "data/historical"
from_ts               = ""
to_ts                 = ""
fee_bps               = 4.0
slippage_bps          = 2.0
market_impact_bps     = 1.0
trading_days_per_year = 365.0
trades_per_day        = 12.0

[survival]
enabled                        = true
death_line_pct                 = 0.70
loss_streak_short              = 3
loss_streak_short_cooldown_min = 60
loss_streak_long               = 5
loss_streak_long_window_min    = 60
loss_streak_long_cooldown_min  = 240
daily_loss_count               = 6
auto_flat_drawdown_pct         = 5.0
refresh_secs                   = 15
equity_refresh_secs            = 60
vol_spike_mult                 = 2.0
news_panic_threshold           = -0.5
news_euphoria_threshold        = 0.7
daily_pnl_ratchet_pct          = 1.0

[control]
telegram_commands_enabled = true
allowed_user_ids          = [7773988648]
poll_secs                 = 3

[quant]
enabled                  = true
kelly_cap                = 0.25
kelly_min_trades         = 20
target_vol_annual        = 0.15
max_vol_multiplier       = 2.0
vol_window               = 60
var_confidence           = 0.95
max_var_pct              = 0.03
ic_window                = 50
ic_min_abs               = 0.05
ic_max_boost             = 10
kalman_process_noise     = 0.01
kalman_measurement_noise = 1.0
kalman_min_velocity_bps  = 3.0
