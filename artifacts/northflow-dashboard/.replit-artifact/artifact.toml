kind = "web"
previewPath = "/"
title = "Northflow Research Dashboard"
version = "1.0.0"
id = "artifacts/northflow-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18381

[services.development]
run = "pnpm --filter @workspace/northflow-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/northflow-dashboard", "run", "build" ]
publicDir = "artifacts/northflow-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18381"
BASE_PATH = "/"
